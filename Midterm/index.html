<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digimon World</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap"
rel="stylesheet">

<style>


:root{
--bg:#050b18;
--text:#ffffff;
--card:#10192c;
--border:rgba(255,255,255,0.08);
--input:#10192c;
--suggest:#0f172a;
--btn1:#06b6d4;
--btn2:#2563eb;
--shadow:rgba(0,0,0,.4);
}



body.light{
--bg:#eef4ff;
--text:#111827;
--card:#ffffff;
--border:rgba(0,0,0,0.08);
--input:#ffffff;
--suggest:#ffffff;
--btn1:#3b82f6;
--btn2:#6366f1;
--shadow:rgba(0,0,0,.08);
}



body{
margin:0;
font-family:Poppins;
background:var(--bg);
color:var(--text);
overflow-x:hidden;
transition:
background .35s ease,
color .35s ease;
}



#loadingScreen{
position:fixed;
inset:0;
background:var(--bg);
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:9999;
transition:.4s;
}

.loader-text{
color:#67e8f9;
animation:blink 1s infinite;
}

@keyframes blink{
50%{
opacity:.3;
}
}


.particles{
position:fixed;
width:100%;
height:100%;
pointer-events:none;
z-index:0;
}

.particles span{
position:absolute;
width:4px;
height:4px;
background:#67e8f9;
border-radius:50%;
opacity:.4;
animation:float 10s linear infinite;
}

@keyframes float{
from{
transform:translateY(100vh);
}
to{
transform:translateY(-10vh);
}
}



.hero-section{
min-height:100vh;
position:relative;
z-index:1;
background:
linear-gradient(rgba(0,0,0,.65),rgba(0,0,0,.65)),
url('https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80&w=1600&auto=format&fit=crop');
background-size:cover;
background-position:center;
transition:.4s;
}

body.light .hero-section{
background:
linear-gradient(rgba(255,255,255,.65),rgba(255,255,255,.65)),
url('https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80&w=1600&auto=format&fit=crop');
background-size:cover;
background-position:center;
}



.hero-title{
font-size:75px;
font-weight:900;
text-transform:uppercase;
text-shadow:0 0 25px rgba(0,0,0,.5);
}



.custom-navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
flex-wrap:wrap;
gap:15px;
}


.search-wrapper{
display:flex;
gap:10px;
align-items:center;
}

.search-box{
display:flex;
position:relative;
gap:10px;
}

.search-box input{
width:260px;
height:45px;
border-radius:40px;
border:1px solid var(--border);
background:var(--input);
color:var(--text);
padding:0 16px;
outline:none;
transition:.3s;
}

.search-box input::placeholder{
color:gray;
}

.search-box button{
height:45px;
padding:0 20px;
border:none;
border-radius:40px;
background:linear-gradient(135deg,var(--btn1),var(--btn2));
color:white;
font-weight:600;
}



.suggest-box{
position:absolute;
top:55px;
left:0;
width:260px;
background:var(--suggest);
border:1px solid var(--border);
border-radius:15px;
overflow:hidden;
display:none;
z-index:999;
box-shadow:0 10px 25px var(--shadow);
}

.suggest-item{
padding:12px 15px;
cursor:pointer;
transition:.2s;
color:var(--text);
}

.suggest-item:hover{
background:rgba(255,255,255,.08);
}

body.light .suggest-item:hover{
background:rgba(0,0,0,.05);
}



.nav-btn{
padding:10px 24px;
border:none;
border-radius:40px;
background:linear-gradient(135deg,var(--btn1),var(--btn2));
color:white;
font-weight:600;
cursor:pointer;
transition:.25s;
}

.nav-btn:hover{
transform:translateY(-2px);
}

.nav-btn:active{
transform:scale(.96);
}



.nav-btn.clicked{
background:linear-gradient(135deg,#22c55e,#16a34a) !important;
transform:scale(.95);
box-shadow:0 0 15px rgba(34,197,94,.5);
}

.search-box button.clicked{
background:linear-gradient(135deg,#f59e0b,#ea580c) !important;
transform:scale(.95);
box-shadow:0 0 15px rgba(245,158,11,.5);
}



.digimon-section{
padding:80px 0;
position:relative;
z-index:2;
}



.digimon-card{
background:var(--card);
border:1px solid var(--border);
border-radius:20px;
padding:20px;
text-align:center;
cursor:pointer;
transition:.3s;
height:100%;
box-shadow:0 10px 25px var(--shadow);
}

.digimon-card:hover{
transform:translateY(-10px);
}

.digimon-card img{
width:100%;
height:220px;
object-fit:contain;
}

.level-badge{
display:inline-block;
margin-top:10px;
padding:8px 16px;
border-radius:30px;
background:linear-gradient(135deg,var(--btn1),var(--btn2));
color:white;
font-size:14px;
}



#detailPage{
display:none;
padding:80px 20px;
text-align:center;
}

#detailContent img{
width:300px;
max-width:100%;
}



@media(max-width:768px){

.hero-title{
font-size:48px;
}

.custom-navbar{
flex-direction:column;
}

.search-box{
flex-direction:column;
width:100%;
}

.search-box input,
.search-box button{
width:100%;
}

.suggest-box{
width:100%;
}

}

</style>
</head>

<body>



<div id="loadingScreen">
<h2 class="loader-text">
CONNECTING TO DIGITAL WORLD...
</h2>
</div>



<div class="particles" id="particles"></div>



<section class="hero-section" id="homeSection">

<nav class="container custom-navbar">

<div class="fw-bold fs-4">
DIGIMON
</div>

<div class="search-wrapper">

<div class="search-box">

<input
type="text"
id="searchInput"
placeholder="Search Digimon..."
oninput="showSuggestion()"
>

<button onclick="searchDigimon()">
Search
</button>

<div id="suggestBox" class="suggest-box"></div>

</div>

<button
class="nav-btn"
id="themeBtn"
onclick="toggleTheme()"
>
 Dark
</button>

</div>

</nav>

<div class="container text-center mt-5 pt-5">

<h1 class="hero-title">
DIGITAL WORLD
</h1>

<button
class="nav-btn mt-4"
onclick="showAllDigimon()"
>
ALL DIGIMON
</button>

</div>

</section>



<section
class="digimon-section"
id="digimonSection"
style="display:none;"
>

<div class="container">

<div class="d-flex justify-content-between align-items-center mb-4">

<h2>All Digimon</h2>

<button class="nav-btn" onclick="goHome()">
Home
</button>

</div>

<div class="mb-4 d-flex gap-2 flex-wrap">

<button class="nav-btn" onclick="filterDigimon('All')">
All
</button>

<button class="nav-btn" onclick="filterDigimon('Rookie')">
Rookie
</button>

<button class="nav-btn" onclick="filterDigimon('Champion')">
Champion
</button>

<button class="nav-btn" onclick="filterDigimon('Ultimate')">
Ultimate
</button>

<button class="nav-btn" onclick="filterDigimon('Mega')">
Mega
</button>

</div>

<div class="row" id="contentArea"></div>

</div>

</section>



<section id="detailPage">

<button class="nav-btn mb-4" onclick="backToList()">
← Back
</button>

<div id="detailContent"></div>

</section>

<script>



const api="https://digimon-api.vercel.app/api/digimon";

let allDigimon=[];



fetch(api)
.then(r=>r.json())
.then(r=>{
allDigimon=r;
});



window.onload=function(){

setTimeout(()=>{
document.getElementById("loadingScreen").style.display="none";
},1200);

createParticles();

loadTheme();

}



function createParticles(){

let box=document.getElementById("particles");

for(let i=0;i<30;i++){

let s=document.createElement("span");

s.style.left=Math.random()*100+"%";

s.style.animationDuration=
(5+Math.random()*8)+"s";

box.appendChild(s);

}

}



function toggleTheme(){

document.body.classList.toggle("light");

const btn=document.getElementById("themeBtn");

if(document.body.classList.contains("light")){

btn.innerHTML=" Light";

localStorage.setItem("theme","light");

}else{

btn.innerHTML=" Dark";

localStorage.setItem("theme","dark");

}

}



function loadTheme(){

const savedTheme=localStorage.getItem("theme");

const btn=document.getElementById("themeBtn");

if(savedTheme==="light"){

document.body.classList.add("light");

btn.innerHTML=" Light";

}else{

document.body.classList.remove("light");

btn.innerHTML=" Dark";

}

}



function render(data){

let box=document.getElementById("contentArea");

box.innerHTML="";

if(data.length===0){

box.innerHTML=`

<div class="text-center">
<h3>No Digimon Found</h3>
</div>

`;

return;

}

data.forEach(d=>{

box.innerHTML+=`

<div class="col-md-3 mb-4">

<div
class="digimon-card"
onclick="openDetail('${d.name}')"
>

<img src="${d.img}">

<h5 class="mt-3">
${d.name}
</h5>

<div class="level-badge">
${d.level}
</div>

</div>

</div>

`;

});

}



function showAllDigimon(){

document.getElementById("homeSection").style.display="none";

document.getElementById("detailPage").style.display="none";

document.getElementById("digimonSection").style.display="block";

render(allDigimon);

}



function filterDigimon(level){

if(level==="All"){

render(allDigimon);

return;

}

let filtered=
allDigimon.filter(d=>d.level===level);

render(filtered);

}



function openDetail(name){

let d=
allDigimon.find(x=>x.name===name);

document.getElementById("homeSection").style.display="none";

document.getElementById("digimonSection").style.display="none";

document.getElementById("detailPage").style.display="block";

document.getElementById("detailContent").innerHTML=`

<img src="${d.img}">

<h2 class="mt-3">
${d.name}
</h2>

<p class="level-badge">
${d.level}
</p>

`;

}



function backToList(){

document.getElementById("detailPage").style.display="none";

document.getElementById("digimonSection").style.display="block";

}



function goHome(){

location.reload();

}



function searchDigimon(){

let value=
document.getElementById("searchInput")
.value
.toLowerCase();

let result=
allDigimon.filter(d=>
d.name.toLowerCase().includes(value)
);

document.getElementById("homeSection").style.display="none";

document.getElementById("detailPage").style.display="none";

document.getElementById("digimonSection").style.display="block";

render(result);

document.getElementById("suggestBox").style.display="none";

}



function showSuggestion(){

let input=
document.getElementById("searchInput")
.value
.toLowerCase();

let box=
document.getElementById("suggestBox");

if(input===""){

box.style.display="none";
box.innerHTML="";

return;

}

let matched=
allDigimon.filter(d=>

d.name.toLowerCase().startsWith(input)

).slice(0,6);

if(matched.length===0){

box.style.display="none";

return;

}

box.innerHTML="";

matched.forEach(d=>{

box.innerHTML+=`

<div
class="suggest-item"
onclick="selectSuggestion('${d.name}')"
>

${d.name}

</div>

`;

});

box.style.display="block";

}



function selectSuggestion(name){

document.getElementById("searchInput").value=name;

document.getElementById("suggestBox").style.display="none";

openDetail(name);

}


const allButtons=document.querySelectorAll("button");

allButtons.forEach(btn=>{

btn.addEventListener("click",()=>{

btn.classList.add("clicked");

setTimeout(()=>{
btn.classList.remove("clicked");
},200);

});

});
</script>

</body>
</html>
